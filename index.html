<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Pose · Leroy Merlin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;background:#f3f4f1;color:#1a1a1a;min-height:100vh;-webkit-font-smoothing:antialiased}
:root{--g:#78BE20;--gd:#5a9118;--gl:#e8f5d0;--gx:#f4fae8;--blk:#1a1a1a;--mid:#e2e2de;--mut:#6b6b66;--mut2:#9a9a94}
svg{display:inline-block}
.icon-spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.btn{padding:9px 16px;border-radius:7px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px;justify-content:center;letter-spacing:.1px}
.btn-p{background:var(--g);color:white}.btn-p:hover{background:var(--gd)}.btn-p:active{transform:scale(.98)}
.btn-o{background:transparent;border:1.5px solid rgba(255,255,255,.25);color:white}.btn-o:hover{border-color:var(--g);color:var(--g)}
.btn-d{background:var(--blk);color:white}.btn-d:hover{background:#333}
.btn-sm{padding:7px 13px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-link-small{background:none;border:none;font-size:12px;color:var(--mut2);cursor:pointer;text-decoration:underline}
/* HEADER */
.hdr{background:var(--blk);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}.tri{width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-bottom:22px solid var(--g)}
.logo-t{color:white;font-size:13.5px;font-weight:700;line-height:1.25;letter-spacing:.2px}.logo-s{font-size:10px;color:var(--g);font-weight:500;letter-spacing:1.1px;text-transform:uppercase}
/* LOGIN ADMIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--blk)}
.login-card{background:white;border-radius:14px;padding:42px 38px;width:340px;text-align:center}
/* LOGIN CLIENT */
.login-client-wrap{max-width:400px;margin:50px auto;text-align:center}
.login-client-card{background:white;border-radius:16px;border:1px solid var(--mid);padding:40px 34px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.login-client-icon{color:var(--g);margin-bottom:14px}
.login-client-title{font-size:19px;font-weight:700;margin-bottom:8px;letter-spacing:-.2px}
.login-client-sub{font-size:13px;color:var(--mut);margin-bottom:24px;line-height:1.6}
.login-client-input{width:100%;text-align:center;font-size:18px;font-weight:700;letter-spacing:1.5px;margin-bottom:12px;padding:12px}
.login-client-err{color:#d23c3c;font-size:13px;margin-top:12px;min-height:18px}
.login-client-hint{font-size:11px;color:var(--mut2);margin-top:22px;line-height:1.5}
/* ADMIN */
.page{padding:24px;max-width:1100px;margin:0 auto}
.tab-bar{display:flex;gap:4px;margin-bottom:20px;border-bottom:1.5px solid var(--mid)}
.newtype-bar{display:flex;gap:8px;margin-bottom:16px}
.newtype-btn{flex:1;padding:11px;border-radius:9px;border:1.5px solid var(--mid);background:white;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;color:var(--mut);transition:all .15s}
.newtype-btn:hover{border-color:var(--g);color:var(--gd)}
.newtype-btn.active{background:var(--g);border-color:var(--g);color:white}
.type-tag{display:inline-block;font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px}
.type-tag-pose{background:var(--gl);color:var(--gd)}
.type-tag-sav{background:#fde4d6;color:#b5470a}
.tab{padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--mut);border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all .15s}
.tab.active{color:var(--g);border-bottom-color:var(--g)}
.dos-grid{display:flex;flex-direction:column;gap:9px}
.dos-card{background:white;border-radius:10px;border:1px solid var(--mid);padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .15s}
.dos-card:hover{border-color:var(--g);box-shadow:0 2px 10px rgba(120,190,32,.1)}
.sp{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.sp1{background:#fef0db;color:#9a5b00}.sp2{background:#e1eefa;color:#1e5d96}.sp3{background:#f0e3f6;color:#7a3596}
.sp4{background:#fce0ea;color:#9c1655}.sp5{background:var(--gl);color:var(--gd)}.sp6{background:var(--g);color:white}
.form-card{background:white;border-radius:12px;border:1px solid var(--mid);padding:26px;margin-bottom:20px}
.fg{display:flex;flex-direction:column;gap:6px}
label{font-size:11.5px;font-weight:600;color:#4a4a47;text-transform:uppercase;letter-spacing:.4px}
input,textarea{padding:10px 12px;border:1.5px solid var(--mid);border-radius:7px;font-size:14px;font-family:inherit;background:white;color:var(--blk);transition:border-color .15s}
input:focus,textarea:focus{outline:none;border-color:var(--g)}
textarea{resize:vertical;min-height:72px}
.ic{background:white;border-radius:11px;border:1px solid var(--mid);padding:18px 20px;margin-bottom:12px}
.ict{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-bottom:13px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f2f2ee;font-size:13px}
.ir:last-child{border:none}
.atl{display:flex;flex-direction:column}
.tli{display:flex;gap:14px;align-items:flex-start;position:relative}
.tli:not(:last-child) .tll{position:absolute;left:11px;top:27px;width:2px;bottom:-10px;background:var(--mid)}
.tli.done:not(:last-child) .tll{background:var(--g)}
.tld{width:24px;height:24px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;position:relative;z-index:1}
.tld.done{background:var(--g);color:white}.tld.current{background:var(--gl);border:2px solid var(--g);color:var(--gd)}.tld.pending{background:white;border:2px solid var(--mid);color:var(--mut2)}
.tlc{flex:1;padding-bottom:21px}
.step-sel{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.step-btn{width:100%;text-align:left;padding:9px 12px;border-radius:7px;border:1.5px solid transparent;font-size:12px;font-weight:600;cursor:pointer;background:#f7f7f4;color:var(--blk);transition:all .15s;display:flex;align-items:center;gap:7px}
.step-btn:hover{background:var(--gl);border-color:var(--g);color:var(--gd)}.step-btn.sel{background:var(--g);color:white;border-color:var(--g)}
.dtab-bar{display:flex;gap:4px;margin-bottom:14px;border-bottom:1.5px solid var(--mid);flex-wrap:wrap}
.dtab{padding:9px 14px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--mut);border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.dtab:hover{color:var(--gd)}
.dtab.active{color:var(--g);border-bottom-color:var(--g)}
.dtab-panel{animation:fadeInTab .2s ease}
@keyframes fadeInTab{from{opacity:0}to{opacity:1}}
.drive-locked{display:flex;align-items:center;gap:8px;background:#f7f7f4;border:1.5px solid var(--mid);border-radius:7px;padding:11px 13px;cursor:pointer;transition:all .15s;color:var(--gd)}
.drive-locked:hover{border-color:var(--g);background:var(--gx)}
.drive-locked-text{font-size:11.5px;font-family:monospace;color:var(--gd);word-break:break-all;line-height:1.4}
.drive-locked-pending{cursor:default;color:var(--mut)}
.drive-locked-pending:hover{border-color:var(--mid);background:#f7f7f4}
.drive-locked-pending svg{animation:spin 1s linear infinite}
/* CLIENT — wrapper principal */
.wc{background:white;border-radius:14px;border:1px solid var(--mid);overflow:hidden;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,.02)}
.wb{background:var(--g);padding:24px 26px;position:relative;overflow:hidden}
.wb::after{content:'';position:absolute;right:-30px;top:-30px;width:130px;height:130px;background:rgba(255,255,255,.07);border-radius:50%}
.wb::before{content:'';position:absolute;right:20px;bottom:-40px;width:80px;height:80px;background:rgba(255,255,255,.05);border-radius:50%}
.wt{color:white;font-size:20px;font-weight:700;letter-spacing:-.3px}
.ws{color:rgba(255,255,255,.85);font-size:13px;margin-top:5px;font-weight:500}
.wbd{padding:24px 26px}
.cig{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:22px}
.cib{background:#f7f7f4;border-radius:9px;padding:13px 15px}
.cibl{font-size:10.5px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.cibv{font-size:16px;font-weight:700;margin-top:3px;letter-spacing:-.2px}
.cibv-green{color:var(--gd)}
.stl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);margin-bottom:14px}
.step-banner{background:var(--gx);border:1px solid #d9efc4;border-radius:10px;padding:12px 16px;font-size:13px;color:var(--gd);font-weight:600;margin-bottom:22px;display:flex;align-items:center;gap:9px}
.conseiller-msg{display:flex;gap:12px;background:#fafbf8;border:1.5px solid var(--mid);border-radius:12px;padding:14px 16px;margin-bottom:22px}
.conseiller-msg-ic{width:34px;height:34px;border-radius:50%;background:var(--g);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.conseiller-msg-from{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.conseiller-msg-text{font-size:13.5px;color:#333;line-height:1.55;white-space:pre-wrap}
/* TIMELINE — animée, barres de progression + pulse */
.timeline-v3{display:flex;flex-direction:column;gap:0;margin-bottom:4px;position:relative}
.trow{display:flex;justify-content:space-between;position:relative;padding:0 2px}
.trow-track{position:absolute;top:19px;left:12.5%;right:12.5%;height:3px;background:var(--mid);border-radius:2px;z-index:0;overflow:hidden}
.trow-fill{height:100%;background:linear-gradient(90deg,var(--g),#8fd13a);border-radius:2px;width:0;transition:width 1s cubic-bezier(.22,.9,.3,1)}
.trow-fill-rev{margin-left:auto;background:linear-gradient(270deg,var(--g),#8fd13a)}
.tnode{display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;flex:1;min-width:0;gap:7px;opacity:0;animation:nodeIn .5s ease forwards;animation-delay:var(--d,0ms)}
.tdot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .35s cubic-bezier(.34,1.4,.64,1);position:relative}
.tdot.done{background:var(--g);color:white}
.tdot.cur{background:white;border:2.5px solid var(--g);color:var(--gd)}
.tdot.cur::before{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--g);animation:pulseRing 1.8s ease-out infinite}
.tdot.cur::after{content:'';position:absolute;inset:0;border-radius:50%;box-shadow:0 0 0 4px var(--gl);animation:pulseGlow 1.8s ease-in-out infinite}
.tdot.pend{background:white;color:var(--mut2);border:1.5px solid var(--mid)}
.tlbl{font-size:10px;font-weight:600;text-align:center;max-width:74px;line-height:1.3;word-break:break-word;transition:color .3s}
.tlbl.done{color:var(--gd)}.tlbl.cur{color:var(--blk);font-weight:700}.tlbl.pend{color:var(--mut2)}
.tbadge{font-size:8.5px;font-weight:700;background:var(--g);color:white;padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.3px;margin-top:1px;animation:badgeIn .3s ease .4s backwards}
.tconnect-wrap{position:relative;height:50px;margin:2px 0}
.tconnect{position:absolute;right:12.5%;top:0;bottom:0;width:3px;transform:translateX(50%)}
.tconnect-track{position:absolute;inset:0;background:var(--mid);border-radius:2px}
.tconnect-fill{position:absolute;top:0;left:0;right:0;height:0;background:linear-gradient(180deg,var(--g),#8fd13a);border-radius:2px;transition:height 1s cubic-bezier(.22,.9,.3,1) .3s}
@keyframes nodeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes badgeIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes pulseRing{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.35);opacity:0}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 4px var(--gl)}50%{box-shadow:0 0 0 7px rgba(120,190,32,.15)}}
/* PASTILLES DOCUMENTS */
.doc-pills{display:flex;gap:10px;margin-bottom:22px}
.dpill{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 10px;border-radius:13px;font-size:11.5px;font-weight:700;position:relative;cursor:default;text-align:center;transition:all .2s;background:#fafaf8;border:1.5px solid var(--mid)}
.dpill-ic{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s}
.dpill.todo .dpill-ic{background:#ececea;color:var(--mut2)}
.dpill.todo{color:var(--mut2)}
.dpill.active{background:white;border-color:#c5e69a;cursor:pointer;box-shadow:0 1px 4px rgba(120,190,32,.08)}
.dpill.active .dpill-ic{background:var(--g);color:white}
.dpill.active:hover{border-color:var(--g);box-shadow:0 4px 14px rgba(120,190,32,.18);transform:translateY(-2px)}
.dpill.active{color:var(--gd)}
.dpill-check{position:absolute;top:8px;right:9px;color:white;background:var(--g);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center}
/* CONTACT */
.cc{background:var(--blk);color:white;border-radius:11px;padding:17px 20px;display:flex;align-items:center;gap:14px;margin-top:8px}
.cav{width:42px;height:42px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.cc-name{font-weight:700;font-size:14px}
.cc-role{font-size:12px;color:rgba(255,255,255,.55);margin-top:2px}
.cc-tel{font-size:13px;color:var(--g);font-weight:600;margin-top:6px;display:flex;align-items:center;gap:6px}
.equipe-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.equipe-item{display:flex;align-items:center;gap:11px;background:#fafaf8;border:1px solid var(--mid);border-radius:9px;padding:10px 13px}
.equipe-av{width:32px;height:32px;border-radius:50%;background:var(--mut2);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.equipe-nom{font-size:13px;font-weight:700}
.equipe-role{font-size:11.5px;color:var(--mut);margin-top:1px}
.creneau-item{display:flex;align-items:center;gap:14px;background:white;border:1px solid var(--mid);border-radius:10px;padding:13px 16px;margin-bottom:8px}
.creneau-item.creneau-pris{background:#fafaf8;opacity:.75}
.creneau-date-jour{font-size:13px;font-weight:700}
.creneau-date-heure{font-size:12px;color:var(--mut);margin-top:1px}
.creneau-statut{margin-left:auto;font-size:11px;font-weight:700;padding:4px 11px;border-radius:14px;white-space:nowrap}
.creneau-statut.libre{background:var(--gl);color:var(--gd)}
.creneau-statut.pris{background:#f0f0ec;color:var(--mut)}
.creneau-client-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:9px;margin-top:13px}
.creneau-client-btn{display:flex;flex-direction:column;gap:4px;background:#fafaf8;border:1.5px solid var(--mid);border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;transition:all .15s}
.creneau-client-btn:hover{border-color:var(--g);background:var(--gx);transform:translateY(-1px)}
.creneau-client-date{font-size:12.5px;font-weight:700}
.creneau-client-heure{font-size:11.5px;color:var(--mut)}
.rdv-report-item{display:flex;align-items:center;gap:14px;background:white;border:1px solid var(--mid);border-radius:11px;padding:14px 17px;margin-bottom:9px}
.rdv-report-ic{width:38px;height:38px;border-radius:9px;background:#fef0db;color:#9a5b00;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rdv-report-body{flex:1;min-width:0}
.rdv-report-date{font-size:13.5px;font-weight:700}
.rdv-report-client{font-size:12px;color:var(--mut);margin-top:2px}
/* CARDS GENERIQUES */
.sc{background:white;border-radius:11px;border:1px solid var(--mid);padding:19px 20px;margin-top:14px}
.ss{display:flex;align-items:center;gap:11px;padding:13px 16px;border-radius:9px;font-size:13px;font-weight:600}
.ss.unsigned{background:#fef6e3;color:#9a5b00}.ss.signed{background:var(--gl);color:var(--gd)}
.upload-zone{border:1.75px dashed var(--mid);border-radius:11px;padding:30px 20px;text-align:center;cursor:pointer;background:#fbfbfa;margin:13px 0;transition:all .2s}
.upload-zone:hover{border-color:var(--g);background:var(--gx)}
.upload-title{font-size:13px;font-weight:600;color:#444;margin-top:9px}
.upload-sub{font-size:11px;color:var(--mut2);margin-top:4px}
.upload-intro{font-size:13px;color:#555;margin:13px 0 4px}
.devis-text{font-size:13px;color:#444;margin-bottom:13px;line-height:1.5}
.ir-l{color:var(--mut)}.ir-v{font-weight:600;text-align:right;max-width:60%}
.project-rows{margin-bottom:4px}
.fiche-btn{width:100%;display:flex;align-items:center;gap:12px;background:var(--gx);border:1.5px solid #d9efc4;border-radius:10px;padding:13px 15px;margin-top:14px;cursor:pointer;transition:all .15s;text-align:left}
.fiche-btn:hover{background:#eaf6da;border-color:var(--g);transform:translateY(-1px);box-shadow:0 3px 10px rgba(120,190,32,.12)}
.fiche-btn-ic{width:36px;height:36px;border-radius:9px;background:var(--g);color:white;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fiche-btn-text{flex:1;display:flex;flex-direction:column;gap:1px}
.fiche-btn-title{font-size:13px;font-weight:700;color:var(--gd)}
.fiche-btn-sub{font-size:11px;color:#6b8a3a}
.fiche-btn-arrow{color:var(--gd);flex-shrink:0}
.plusmoins-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.pm-box{border-radius:10px;padding:12px 14px}
.pm-plus{background:var(--gx);border:1px solid #e1f2c9}
.pm-moins{background:#fdf6ea;border:1px solid #f5e3bd}
.pm-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:5px;margin-bottom:8px}
.pm-plus .pm-label{color:var(--gd)}
.pm-moins .pm-label{color:#9a6a1a}
.pm-item{font-size:12px;line-height:1.5;padding:3px 0;color:#3a3a36}
.pm-plus .pm-item::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--g);margin-right:7px;vertical-align:middle}
.pm-moins .pm-item::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:#d4a23a;margin-right:7px;vertical-align:middle}
@media(max-width:560px){.plusmoins-grid{grid-template-columns:1fr}}
.prix-evo{display:flex;flex-direction:column;gap:7px}
.prix-evo-row{display:flex;justify-content:space-between;font-size:13px}
.prix-evo-final{font-weight:700;color:var(--gd);font-size:15px}
.tarif-total{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:14px;margin-bottom:4px;border-bottom:1px solid #f0f0ec}
.tarif-total-label{font-size:13px;color:var(--mut);font-weight:600}
.tarif-total-val{font-size:22px;font-weight:800;color:var(--gd)}
.tarif-toggle{width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;padding:11px 0 4px;font-size:12.5px;font-weight:600;color:var(--mut);cursor:pointer}
.tarif-toggle:hover{color:var(--gd)}
.tarif-toggle span:last-child{transition:transform .2s}
#tarif-detail{margin-top:10px;display:flex;flex-direction:column;gap:12px}
.tarif-row{display:flex;align-items:center;gap:12px}
.tarif-row-ic{width:32px;height:32px;border-radius:8px;background:#f0f0ec;color:var(--mut);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tarif-row-body{flex:1;min-width:0}
.tarif-row-label{font-size:12px;font-weight:600;color:var(--mut);margin-bottom:5px}
.tarif-row-bar{height:6px;background:#f0f0ec;border-radius:3px;overflow:hidden}
.tarif-row-fill{height:100%;background:var(--g);border-radius:3px}
.tarif-row-fill-pose{background:#7fa9d8}
.tarif-row-val{font-size:14px;font-weight:700;flex-shrink:0;min-width:70px;text-align:right}
/* PROMO / ALERT */
.promo-box{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,var(--gl),var(--gx));border:1.5px dashed var(--g);border-radius:10px;padding:13px 16px}
.promo-title{font-size:13px;font-weight:700;color:var(--gd)}
.promo-sub{font-size:12px;color:#3a5a0a;margin-top:2px}
.ecoptz-row{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#f7f7f4;border-radius:10px;padding:11px 15px}
.ecoptz-info{display:flex;align-items:center;gap:10px}
.ecoptz-label{font-size:13px;font-weight:600}
.alert-box{display:flex;align-items:flex-start;gap:11px;background:#fef6e3;border:1px solid #f5dfa3;border-radius:10px;padding:13px 16px;color:#7a5200}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:4px}
.admin-block-title{font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:8px}
.admin-block-text{font-size:12.5px;color:#555;line-height:1.55}
.plu-statut-pill{display:inline-block;font-size:11px;font-weight:700;padding:4px 11px;border-radius:14px;margin-top:9px}
.plu-statut-attente{background:#fef6e3;color:#9a5b00}
.plu-statut-depose{background:#e1eefa;color:#1e5d96}
.plu-statut-valide{background:var(--gl);color:var(--gd)}
.ptz-pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;background:var(--gx);color:var(--gd);padding:5px 12px;border-radius:14px;border:1px solid #d9efc4}
@media(max-width:560px){.admin-grid{grid-template-columns:1fr}}
.alert-title{font-weight:700;font-size:13px}
.alert-sub{font-size:12px;margin-top:4px;opacity:.85;line-height:1.5}
.plu-map{margin-top:11px;height:200px;border-radius:10px;overflow:hidden;border:1px solid var(--mid);background:#f0f0ec}
.addr-suggestions{position:absolute;top:100%;left:0;right:0;background:white;border:1.5px solid var(--g);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.1);z-index:200;max-height:220px;overflow-y:auto;margin-top:3px}
.addr-item{display:flex;align-items:flex-start;gap:8px;padding:10px 13px;cursor:pointer;font-size:12.5px;color:#333;border-bottom:1px solid #f5f5f3;line-height:1.4;transition:background .1s}
.addr-item:last-child{border:none}
.addr-item:hover{background:var(--gx);color:var(--gd)}
.addr-item svg{flex-shrink:0;margin-top:2px;color:var(--g)}
.plu-addr{font-size:12px;color:var(--mut);margin-top:7px;display:flex;align-items:center;gap:6px}
/* PDF VIEWER */
.pdf-frame{background:#34373a;border-radius:11px;overflow:hidden;margin:13px 0}
.pdf-toolbar{background:#26282a;padding:10px 15px;display:flex;justify-content:space-between;align-items:center}
.pdf-tools{display:flex;gap:6px;align-items:center}
.pdf-btn{background:#454850;color:white;border:none;border-radius:6px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pdf-btn:hover{background:#54575f}
.pdf-info{color:#c8c8c8;font-size:12px;min-width:40px;text-align:center}
.pdf-canvas-wrap{max-height:480px;overflow-y:auto;display:flex;justify-content:center;padding:22px;background:#4b4e51}
.pdf-canvas-wrap canvas{box-shadow:0 6px 24px rgba(0,0,0,.45);border-radius:3px}
.scroll-hint{display:flex;align-items:center;gap:8px;padding:11px 15px;background:#fef6e3;border-radius:9px;font-size:12px;color:#9a5b00;font-weight:600;margin-bottom:11px}
/* SIGNATURE */
.sig-toolbar{display:flex;justify-content:space-between;margin-bottom:9px;align-items:center}
.sig-label{font-size:13px;color:var(--mut);font-weight:600}
.sig-wrap-pro{position:relative;border:1.5px solid var(--mid);border-radius:11px;background:linear-gradient(180deg,#fbfbfa,white);overflow:hidden;cursor:crosshair;margin-bottom:13px}
.sig-wrap-pro canvas{display:block;width:100%;height:170px;touch-action:none;position:relative;z-index:1}
.sig-placeholder-pro{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);font-size:12.5px;color:#c8c8c2;text-align:center;pointer-events:none;z-index:0;line-height:1.8}
.sig-line{position:absolute;bottom:36px;left:26px;right:26px;height:1px;background:#e4e4e0;z-index:0}
.btn-sig-clear{background:white;border:1.5px solid var(--mid);border-radius:7px;padding:6px 13px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;color:#444}
.btn-sig-clear:hover{border-color:var(--g);color:var(--gd)}
.sig-meta{background:#f7f7f4;border-radius:9px;padding:11px 15px;font-size:12px;color:var(--mut);margin-bottom:15px;display:flex;align-items:center;gap:9px;line-height:1.5}
.success-box{background:var(--gl);border:1px solid #c5e69a;border-radius:11px;padding:20px 22px;text-align:center;color:var(--gd)}
.success-title{font-weight:700;font-size:15px;margin-top:8px}
.success-sub{font-size:13px;margin-top:5px;opacity:.85}
/* LIVRAISON */
.livraison-box{display:flex;align-items:center;gap:14px;background:#f7f7f4;border-radius:10px;padding:14px 17px}
.rdv-confirme{display:flex;align-items:center;gap:14px;background:var(--gx);border:1px solid #d9efc4;border-radius:10px;padding:14px 17px;color:var(--gd)}
.rdv-confirme-date{font-size:15px;font-weight:700}
.rdv-confirme-sub{font-size:12px;color:#5a8a2a;margin-top:3px}
.livraison-label{font-size:10.5px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.livraison-val{font-size:16px;font-weight:700;margin-top:3px}
/* UTILS */
.toast{position:fixed;bottom:24px;right:24px;background:var(--blk);color:white;padding:13px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transform:translateY(10px);transition:all .25s cubic-bezier(.34,1.4,.64,1);z-index:9999;pointer-events:none;max-width:340px;box-shadow:0 6px 24px rgba(0,0,0,.22);display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.toast-ok{background:#2d7a2d}
.toast.toast-error{background:#c0392b}
.lbar{height:3px;background:var(--g);display:none;position:fixed;top:0;left:0;z-index:9999;width:0%}
@keyframes spin{to{transform:rotate(360deg)}}
.icon-spin{animation:spin 1s linear infinite}
@media(max-width:680px){
  .doc-pills{flex-wrap:wrap}
  .dpill{min-width:90px}
  .tlbl{max-width:58px;font-size:9.5px}
  .tdot{width:33px;height:33px}
}
</style>
</head>
<body>
<div class="lbar" id="lbar"></div>
<div class="toast" id="toast"></div>

<!-- LOGIN -->

  <div id="vListe">

          <button id="newTypeSav" class="newtype-btn" onclick="switchNewType('sav')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Dossier SAV</button>
        </div>

        <div id="formNewPose" class="form-card">
          <div style="font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--g)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Nouveau dossier Pose</div>
