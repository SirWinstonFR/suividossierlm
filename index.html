<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Pose · Leroy Merlin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
:root{--g:#78BE20;--gd:#5a9118;--gl:#e8f5d0;--gx:#f4fae8;--blk:#1a1a1a;--mid:#e0e0e0;--mut:#666}
.btn{padding:7px 16px;border-radius:4px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-p{background:var(--g);color:white}.btn-p:hover{background:var(--gd)}
.btn-o{background:transparent;border:1.5px solid rgba(255,255,255,.3);color:white}.btn-o:hover{border-color:var(--g);color:var(--g)}
.btn-d{background:var(--blk);color:white}.btn-d:hover{background:#333}
.btn-sm{padding:5px 12px;font-size:12px}
/* HEADER */
.hdr{background:var(--blk);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.tri{width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-bottom:24px solid var(--g)}
.logo-t{color:white;font-size:14px;font-weight:700;line-height:1.2}
.logo-s{font-size:10px;color:var(--g);font-weight:400;letter-spacing:1px;text-transform:uppercase}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--blk)}
.login-card{background:white;border-radius:12px;padding:40px 36px;width:340px;text-align:center}
/* ADMIN */
.page{padding:24px;max-width:1100px;margin:0 auto}
.tab-bar{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--mid)}
.tab{padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--mut);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.active{color:var(--g);border-bottom-color:var(--g)}
.dos-grid{display:flex;flex-direction:column;gap:10px}
.dos-card{background:white;border-radius:8px;border:1px solid var(--mid);padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .15s}
.dos-card:hover{border-color:var(--g);box-shadow:0 2px 8px rgba(120,190,32,.12)}
.sp{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.sp1{background:#fff3e0;color:#e65100}.sp2{background:#e3f2fd;color:#1565c0}.sp3{background:#f3e5f5;color:#6a1b9a}
.sp4{background:#fce4ec;color:#880e4f}.sp5{background:#e8f5d0;color:#3a7008}.sp6{background:var(--g);color:white}
/* FORM */
.form-card{background:white;border-radius:8px;border:1px solid var(--mid);padding:24px;margin-bottom:20px}
.fg{display:flex;flex-direction:column;gap:5px}
label{font-size:12px;font-weight:600;color:#444;text-transform:uppercase;letter-spacing:.5px}
input,textarea{padding:9px 12px;border:1.5px solid var(--mid);border-radius:5px;font-size:14px;font-family:inherit;background:white;color:var(--blk)}
input:focus,textarea:focus{outline:none;border-color:var(--g)}
textarea{resize:vertical;min-height:72px}
/* DETAIL */
.ic{background:white;border-radius:8px;border:1px solid var(--mid);padding:18px 20px;margin-bottom:12px}
.ict{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-bottom:12px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.ir:last-child{border:none}
/* TIMELINE ADMIN */
.atl{display:flex;flex-direction:column}
.tli{display:flex;gap:14px;align-items:flex-start;position:relative}
.tli:not(:last-child) .tll{position:absolute;left:11px;top:26px;width:2px;bottom:-10px;background:var(--mid)}
.tli.done:not(:last-child) .tll{background:var(--g)}
.tld{width:24px;height:24px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;position:relative;z-index:1}
.tld.done{background:var(--g);color:white}.tld.current{background:var(--gl);border:2px solid var(--g);color:var(--gd)}.tld.pending{background:white;border:2px solid var(--mid);color:#bbb}
.tlc{flex:1;padding-bottom:20px}
.step-sel{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.step-btn{width:100%;text-align:left;padding:8px 12px;border-radius:5px;border:1.5px solid transparent;font-size:12px;font-weight:600;cursor:pointer;background:#f5f5f5;color:var(--blk);transition:all .15s}
.step-btn:hover{background:var(--gl);border-color:var(--g);color:var(--gd)}.step-btn.sel{background:var(--g);color:white;border-color:var(--g)}
.pb{height:6px;background:var(--mid);border-radius:3px;overflow:hidden;margin:10px 0 4px}
.pf{height:100%;background:var(--g);border-radius:3px}
/* CLIENT */
.cli-hdr{background:var(--blk);padding:0 24px;height:56px;display:flex;align-items:center;gap:12px}
.cli-body{max-width:860px;margin:0 auto;padding:24px 16px}
.wc{background:white;border-radius:10px;border:1px solid var(--mid);overflow:hidden;margin-bottom:16px}
.wb{background:var(--g);padding:20px 24px;position:relative;overflow:hidden}
.wb::after{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;background:rgba(255,255,255,.08);border-radius:50%}
.wt{color:white;font-size:18px;font-weight:800}
.ws{color:rgba(255,255,255,.8);font-size:13px;margin-top:4px}
.wbd{padding:20px 24px}
.cig{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.cib{background:#f5f5f5;border-radius:6px;padding:12px 14px}
.cibl{font-size:11px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.cibv{font-size:16px;font-weight:800;margin-top:2px}
.stl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-bottom:14px}
/* TIMELINE CLIENT PC */
.only-pc{display:flex}.only-mob{display:none}
.ctl-pc{display:flex;flex-direction:row-reverse;width:100%;overflow-x:auto;padding:0 8px}
.cst{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;min-width:90px;opacity:0;animation:fi .4s ease forwards}
.cst:not(:first-child)::before{content:'';position:absolute;right:50%;top:19px;width:100%;height:2px;background:var(--mid);z-index:0}
.cst.cdone:not(:first-child)::before{background:var(--g)}
.cst.ccur:not(:first-child)::before{background:linear-gradient(to left,var(--g),var(--mid))}
.cico{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;z-index:1}
.cico.done{background:var(--g);color:white;font-size:18px}
.cico.cur{background:white;border:3px solid var(--g);color:var(--g);animation:pulse 2s ease infinite}
.cico.pend{background:#f0f0f0;color:#ccc}
.clbl{font-size:11px;font-weight:700;text-align:center;margin-top:8px;line-height:1.3;padding:0 4px}
.clbl.done{color:var(--gd)}.clbl.cur{color:var(--blk)}.clbl.pend{color:#bbb}
.cdt{font-size:10px;color:var(--mut);margin-top:3px;text-align:center}
.cbadge{display:inline-block;background:var(--g);color:white;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;text-transform:uppercase}
/* TIMELINE CLIENT MOBILE */
.ctl-mob{display:flex;flex-direction:column-reverse}
.mst{display:flex;gap:14px;align-items:flex-start;position:relative;transform:translateY(10px);opacity:0;animation:fu .4s ease forwards}
.mst:not(:first-child) .mln{position:absolute;left:15px;bottom:-4px;width:2px;top:34px;background:var(--mid)}
.mst.mdone:not(:first-child) .mln{background:var(--g)}
.mst.mcur:not(:first-child) .mln{background:linear-gradient(to bottom,var(--mid),var(--g))}
.mico{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;position:relative;z-index:1;margin-top:2px}
.mico.done{background:var(--g);color:white}.mico.cur{background:white;border:2.5px solid var(--g);color:var(--g);animation:pulse 2s ease infinite}.mico.pend{background:#f5f5f5;color:#ccc}
.mct{flex:1;padding-bottom:18px}.mtt{font-size:14px;font-weight:700}.mtt.pend{color:#bbb}.mdt{font-size:11px;color:var(--mut);margin-top:2px}
/* CONTACT */
.cc{background:var(--blk);color:white;border-radius:8px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-top:8px}
.cav{width:40px;height:40px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
/* SIGNATURE */
.sc{background:white;border-radius:8px;border:1px solid var(--mid);padding:18px 20px;margin-top:14px}
.ss{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:6px;font-size:13px;font-weight:600}
.ss.u{background:#fff8e1;color:#e65100}.ss.s{background:var(--gl);color:var(--gd)}
.uz{border:2px dashed var(--mid);border-radius:8px;padding:28px 20px;text-align:center;cursor:pointer;background:white;margin:12px 0;transition:all .2s}
.uz:hover{border-color:var(--g);background:var(--gx)}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--g);color:white;padding:12px 20px;border-radius:6px;font-size:13px;font-weight:600;opacity:0;transform:translateY(8px);transition:all .25s;z-index:999;pointer-events:none;max-width:320px}
.toast.show{opacity:1;transform:translateY(0)}
.lbar{height:3px;background:var(--g);animation:sl 1.5s infinite;display:none;position:fixed;top:0;left:0;right:0;z-index:999}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(120,190,32,.4)}50%{box-shadow:0 0 0 7px rgba(120,190,32,0)}}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
@keyframes fi{to{opacity:1}}
@keyframes sl{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
@media(max-width:680px){.only-pc{display:none!important}.only-mob{display:flex!important;flex-direction:column}.dcols{grid-template-columns:1fr!important}}
</style>
</head>
<body>

<!-- CLIENT -->
<div id="vClient" style="display:none">
  <div class="cli-hdr">
    <div class="tri"></div>
    <div class="logo-t" style="color:white">LEROY MERLIN<br><span class="logo-s">Suivi de votre pose</span></div>
  </div>
  <div class="cli-body">
    <div id="cliBody"><div style="text-align:center;padding:60px;color:#aaa"><div style="font-size:32px;margin-bottom:12px">⏳</div>Chargement...</div></div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const CFG = {
  SHEET_ID:    '1zbnly7aZ8AzZlJDsQA5I3hiKAbD2zlpXedvyNcdtsAQ',
  API_KEY:     'AIzaSyCyvTQg8tzasPEvi2-fDtNkO2n6KEcDL-8',
  SHEET_NAME:  'Feuille 1',
  ADMIN_PWD:   'leroy2025',
  SCRIPT_URL:  'https://script.google.com/macros/s/AKfycbzVyE-VoVVtr9iuw3tsW38Iw-lbT_YGlneYlQpRznG9p-PjIfOAWWvNoMhF7FdhUe-Fcg/exec',
};

const STEPS = [
  {l:'Démarche lancée',    i:'🚀'},
  {l:'Rendez-vous planifié',i:'📅'},
  {l:'Retour technicien',  i:'📐'},
  {l:'Devis final envoyé', i:'📋'},
  {l:'Commande confirmée', i:'✅'},
  {l:'Pose effectuée',     i:'🏠'},
];

// ============================================================
// ROUTING — détecte si on est côté client ou admin
// ============================================================
function getToken() {
  const p = new URLSearchParams(location.search);
  if (p.get('token')) return p.get('token');
  const parts = location.pathname.split('/').filter(Boolean);
  const idx = parts.indexOf('client');
  if (idx !== -1 && parts[idx+1]) return parts[idx+1];
  return null;
}

function init() {
  const token = getToken();
  if (token) {
    // Mode client
    show('vClient');
    initClient(token);
  } else if (sessionStorage.getItem('lm_auth') === 'ok') {
    show('vAdmin');
    loadAll();
  } else {
    show('vLogin');
  }
}

function show(id) {
  ['vLogin','vAdmin','vClient'].forEach(v => {
    document.getElementById(v).style.display = v === id ? 'block' : 'none';
  });
}

// ============================================================
// AUTH
// ============================================================
function doLogin() {
  if (document.getElementById('lpwd').value === CFG.ADMIN_PWD) {
    sessionStorage.setItem('lm_auth','ok');
    show('vAdmin');
    loadAll();
  } else {
    document.getElementById('lerr').textContent = 'Mot de passe incorrect.';
  }
}
function doLogout() { sessionStorage.removeItem('lm_auth'); show('vLogin'); }

// ============================================================
// SHEETS
// ============================================================
let _dos = [];

async function sheetsGetAll() {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CFG.SHEET_ID}/values/${encodeURIComponent(CFG.SHEET_NAME)}?key=${CFG.API_KEY}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Sheets ' + r.status);
  const d = await r.json();
  if (!d.values || d.values.length < 2) return [];
  const [h, ...rows] = d.values;
  return rows.map(row => { const o={}; h.forEach((k,i)=>o[k]=row[i]||''); return o; });
}

async function sheetsWrite(action, payload) {
  await fetch(CFG.SCRIPT_URL, {
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action,...payload})
  });
}

function genToken() { return Math.random().toString(36).slice(2,10); }
async function nextId() {
  const all = await sheetsGetAll();
  const max = Math.max(0,...all.map(d=>parseInt(d.id?.replace('DOS-',''))||0));
  return 'DOS-'+String(max+1).padStart(3,'0');
}

// ============================================================
// ADMIN — LISTE
// ============================================================
async function loadAll() {
  document.getElementById('lbar').style.display = 'block';
  try { _dos = await sheetsGetAll(); } catch(e) { toast('Erreur connexion Sheets'); _dos=[]; }
  document.getElementById('lbar').style.display = 'none';
  renderListe();
}

function renderListe(f) {
  let list = _dos;
  if (f==='cours') list = _dos.filter(d=>parseInt(d.etape)<6);
  if (f==='fin')   list = _dos.filter(d=>parseInt(d.etape)===6);
  const cont = document.getElementById('listeDos');
  if (!list.length) { cont.innerHTML='<div style="color:#aaa;padding:20px 0">Aucun dossier.</div>'; return; }
  cont.innerHTML = list.map(d => {
    const e=parseInt(d.etape)||1, s=STEPS[e-1];
    const prix = d.prix_final ? parseInt(d.prix_final).toLocaleString('fr-FR')+' €' : '—';
    return `<div class="dos-card" onclick="openDetail('${d.id}')">
      <div style="flex:1;min-width:0">
        <div style="font-size:15px;font-weight:700">${d.nom}${d.signe==='true'?'<span style="color:var(--g);font-size:11px;margin-left:8px">✓ Signé</span>':''}</div>
        <div style="font-size:12px;color:var(--mut);margin-top:2px">${d.id} · ${d.gamme||'—'} · ${d.conseiller||'—'}</div>
      </div>
      <span class="sp sp${e}">${s.l}</span>
      <div style="font-size:15px;font-weight:700;color:var(--gd);white-space:nowrap">${prix}</div>
      <div style="display:flex;gap:6px" onclick="event.stopPropagation()">
        <button class="btn btn-p btn-sm" onclick="copyLien('${d.token}')">🔗 Lien</button>
      </div>
    </div>`;
  }).join('');
}

function filterTab(f,btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('formNew').style.display='none';
  renderListe(f);
}

function showTab(t) {
  document.getElementById('formNew').style.display = t==='new'?'block':'none';
}

// ============================================================
// ADMIN — CRÉER
// ============================================================
async function creerDos() {
  const nom = document.getElementById('fnom').value.trim();
  if (!nom) { toast('Nom requis'); return; }
  const id = await nextId();
  const token = genToken();
  const today = new Date().toLocaleDateString('fr-FR');
  const row = {
    id, nom,
    gamme:          document.getElementById('fgam').value||'',
    etape:          '1',
    prix_est:       document.getElementById('fest').value||'',
    prix_final:     document.getElementById('fpfin').value||'',
    token,
    email:          document.getElementById('feml').value||'',
    tel:            document.getElementById('ftel').value||'',
    conseiller:     document.getElementById('fcon').value||'',
    tel_conseiller: document.getElementById('ftlc').value||'',
    notes:          document.getElementById('fnot').value||'',
    date1:today,date2:'',date3:'',date4:'',date5:'',date6:'',
    signe:'false',sig_date:''
  };
  await sheetsWrite('append',{row});
  _dos.unshift(row);
  toast('✓ Dossier '+id+' créé !');
  showTab('list');
  renderListe();
}

// ============================================================
// ADMIN — DÉTAIL
// ============================================================
let _curId = null;

function openDetail(id) {
  _curId = id;
  document.getElementById('vListe').style.display = 'none';
  document.getElementById('vDetail').style.display = 'block';
  renderDetail();
}

function goListe() {
  document.getElementById('vDetail').style.display = 'none';
  document.getElementById('vListe').style.display = 'block';
