<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi de votre pose · Leroy Merlin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
:root{--green:#78BE20;--gd:#5a9118;--gl:#e8f5d0;--gx:#f4fae8;--black:#1a1a1a;--gray:#f5f5f5;--mid:#e0e0e0;--muted:#666}
.btn{padding:7px 16px;border-radius:4px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-primary{background:var(--green);color:white}.btn-primary:hover{background:var(--gd)}
.btn-sm{padding:5px 12px;font-size:12px}
.client-header{background:var(--black);padding:0 24px;height:56px;display:flex;align-items:center;gap:12px}
.logo-triangle{width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-bottom:24px solid var(--green)}
.logo-text{color:white;font-size:14px;font-weight:700;letter-spacing:.5px;line-height:1.2}
.logo-sub{font-size:10px;color:var(--green);font-weight:400;letter-spacing:1px;text-transform:uppercase}
.client-body{max-width:860px;margin:0 auto;padding:24px 16px}
.welcome-card{background:white;border-radius:10px;border:1px solid var(--mid);overflow:hidden;margin-bottom:16px}
.welcome-banner{background:var(--green);padding:20px 24px;position:relative;overflow:hidden}
.welcome-banner::after{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;background:rgba(255,255,255,.08);border-radius:50%}
.welcome-title{color:white;font-size:18px;font-weight:800}
.welcome-sub{color:rgba(255,255,255,.8);font-size:13px;margin-top:4px}
.welcome-body{padding:20px 24px}
.client-info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.client-info-box{background:var(--gray);border-radius:6px;padding:12px 14px}
.client-info-box-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.client-info-box-val{font-size:16px;font-weight:800;margin-top:2px}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:14px}
.info-card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
/* TIMELINE PC */
.only-pc{display:flex}.only-mobile{display:none}
.client-tl-pc{display:flex;flex-direction:row-reverse;align-items:flex-start;gap:0;position:relative;padding:0 12px;overflow-x:auto;width:100%}
.cstep{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;min-width:90px;opacity:0;animation:fadeIn .4s ease forwards}
.cstep:not(:first-child)::before{content:'';position:absolute;right:50%;top:19px;width:100%;height:2px;background:var(--mid);z-index:0}
.cstep.cdone:not(:first-child)::before{background:var(--green)}
.cstep.ccurrent:not(:first-child)::before{background:linear-gradient(to left,var(--green),var(--mid))}
.cicon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;z-index:1}
.cicon.done{background:var(--green);color:white;font-size:18px}
.cicon.current{background:white;border:3px solid var(--green);color:var(--green);animation:pulse 2s ease infinite}
.cicon.pending{background:#f0f0f0;color:#ccc}
.clabel{font-size:11px;font-weight:700;text-align:center;margin-top:8px;line-height:1.3;padding:0 4px}
.clabel.done{color:var(--gd)}.clabel.current{color:var(--black)}.clabel.pending{color:#bbb}
.cdate{font-size:10px;color:var(--muted);margin-top:3px;text-align:center}
.current-badge-h{display:inline-block;background:var(--green);color:white;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}
/* TIMELINE MOBILE */
.client-tl-mobile{display:flex;flex-direction:column-reverse;gap:0}
.mstep{display:flex;gap:14px;align-items:flex-start;position:relative;transform:translateY(10px);opacity:0;animation:fadeUp .4s ease forwards}
.mstep:not(:first-child) .mline{position:absolute;left:15px;bottom:-4px;width:2px;top:34px;background:var(--mid)}
.mstep.mdone:not(:first-child) .mline{background:var(--green)}
.mstep.mcurrent:not(:first-child) .mline{background:linear-gradient(to bottom,var(--mid),var(--green))}
.micon{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;position:relative;z-index:1;margin-top:2px}
.micon.done{background:var(--green);color:white}.micon.current{background:white;border:2.5px solid var(--green);color:var(--green);animation:pulse 2s ease infinite}.micon.pending{background:#f5f5f5;color:#ccc}
.mcontent{flex:1;padding-bottom:18px}.mtitle{font-size:14px;font-weight:700}.mtitle.pending{color:#bbb}.mdate{font-size:11px;color:var(--muted);margin-top:2px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(120,190,32,.4)}50%{box-shadow:0 0 0 7px rgba(120,190,32,0)}}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{to{opacity:1}}
/* CONTACT */
.contact-card{background:var(--black);color:white;border-radius:8px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-top:8px}
.contact-avatar{width:40px;height:40px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.contact-name{font-weight:700;font-size:14px}.contact-role{font-size:12px;color:rgba(255,255,255,.6);margin-top:1px}.contact-tel{font-size:13px;color:var(--green);font-weight:600;margin-top:4px}
/* SIGNATURE */
.sign-card{background:white;border-radius:8px;border:1px solid var(--mid);padding:18px 20px;margin-top:14px}
.sign-status{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:6px;font-size:13px;font-weight:600}
.sign-status.unsigned{background:#fff8e1;color:#e65100}.sign-status.signed{background:var(--gl);color:var(--gd)}
.upload-zone{border:2px dashed var(--mid);border-radius:8px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;background:white;margin:12px 0}
.upload-zone:hover{border-color:var(--green);background:var(--gx)}
@media(max-width:680px){.only-pc{display:none!important}.only-mobile{display:flex!important;flex-direction:column}.client-body{padding:16px}}
</style>
</head>
<body>
<div class="client-header">
  <div class="logo-triangle"></div>
  <div class="logo-text">LEROY MERLIN<br><span class="logo-sub">Suivi de votre pose</span></div>
</div>
<div class="client-body" id="client-body">
  <div style="text-align:center;padding:60px 20px;color:#aaa">
    <div style="font-size:32px;margin-bottom:12px">⏳</div>
    Chargement de votre dossier...
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="js/config.js"></script>
<script src="js/sheets.js"></script>
<script src="js/pdf.js"></script>
<script src="js/client.js"></script>
</body>
</html>
